<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚾ Baseball Quant</title>
<style>
:root{color-scheme:dark}
body{margin:0;background:#0b1020;color:#e8ecf3;font:17px/1.5 -apple-system,system-ui,sans-serif;
     min-height:100vh;display:flex;flex-direction:column;align-items:center;
     padding:max(40px,env(safe-area-inset-top)) 20px 40px}
h1{font-size:26px;margin:0 0 6px}
.sub{color:#94a3b8;font-size:13px;margin-bottom:30px}
.grid{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px}
a.card{display:flex;align-items:center;justify-content:space-between;
  background:#141a32;border:1px solid #1f2a4a;border-radius:16px;
  padding:20px 22px;text-decoration:none;color:#e8ecf3;transition:transform .1s}
a.card:active{transform:scale(.98)}
.league{font-size:21px;font-weight:700}
.desc{font-size:12px;color:#94a3b8;margin-top:3px}
.upd{font-size:11px;color:#64748b;text-align:right}
.arrow{font-size:20px;color:#60a5fa;margin-left:10px}
footer{margin-top:auto;padding-top:30px;font-size:11px;color:#4b5a76;text-align:center}
</style></head>
<body>
<h1>⚾ Baseball Quant</h1>
<div class="sub">매일 자동 분석 · 바텀업 + Markov 체인 모델</div>
<div class="grid">
  <a class="card" href="kbo/"><div><div class="league">🇰🇷 KBO</div><div class="desc">15:00 · 17:30 KST 자동 갱신</div></div><div><div class="upd" id="u-kbo"></div><span class="arrow">›</span></div></a>
  <a class="card" href="npb/"><div><div class="league">🇯🇵 NPB</div><div class="desc">15:00 · 17:30 KST 자동 갱신</div></div><div><div class="upd" id="u-npb"></div><span class="arrow">›</span></div></a>
  <a class="card" href="mlb/"><div><div class="league">🇺🇸 MLB</div><div class="desc">23:00 · 07:30 KST 자동 갱신</div></div><div><div class="upd" id="u-mlb"></div><span class="arrow">›</span></div></a>
</div>
<footer>모델 기반 분석 · 투자 조언이 아닙니다</footer>
<script>
for(const k of ['kbo','npb','mlb']){
  fetch('status-'+k+'.json?'+Date.now()).then(r=>r.json()).then(s=>{
    if(s.updated){
      const d=new Date(s.updated.replace(' UTC','Z').replace(' ','T'));
      const kst=new Date(d.getTime()+9*3600*1000);
      document.getElementById('u-'+k).textContent='갱신 '+ (kst.getUTCMonth()+1)+'/'+kst.getUTCDate()+' '+String(kst.getUTCHours()).padStart(2,'0')+':'+String(kst.getUTCMinutes()).padStart(2,'0');
    }
  }).catch(()=>{});
}
</script>
</body></html>
